{% extends 'base.html' %}

{% block icerik %}
    <h2 style="color: white;">Projelerim</h2>
    
    {% for proje in projeler %}
        <div class="kart" style="background: white; color: black; padding: 20px; border-radius: 15px; margin: 20px auto; width: 400px; box-shadow: 0px 10px 25px rgba(0,0,0,0.3);">
            <h3>{{ proje.baslik }}</h3>
            <p>{{ proje.detay|truncatechars:100 }}</p>
            
            <a href="{% url 'proje_detay' proje.id %}">
                <button style="background: #764ba2; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer;">Daha Fazla</button>
            </a>
        </div>
    {% empty %}
        <p style="color: white;">Henüz bir proje eklenmemiş.</p>
    {% endfor %}
{% endblock %}
